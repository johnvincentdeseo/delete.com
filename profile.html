<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body style="background-color: #ecdfce;">

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-12">
          <div class="card shadow border-0">
            <div class="card-header text-white py-3 d-flex justify-content-between" style="background-color: #efa03f;">
              <h5 class="mb-0">Account Profile</h5>
              <a href="dashboard.html" class="btn btn-sm btn-outline-light">Back to Dashboard</a>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-4 text-center border-end py-4">
                  <div class="mb-3">
                    <img src="monkey-d-luffy.jpg" class="img-fluid" alt="Responsive image">
                  </div>
                  <h4>Johny Seo</h4>
                  <p class="text-muted">Administrator</p>
                  <button class="btn btn-outline-secondary btn-sm">Update Picture</button>
                </div>
                <div class="col-md-8 px-4 py-4">
                  <form>
                    <div class="row mb-3">
                      <div class="col"><label class="form-label">First Name</label><input type="text" class="form-control" value="John"></div>
                      <div class="col"><label class="form-label">Last Name</label><input type="text" class="form-control" value="Seo"></div>
                    </div>
                    <div class="mb-3"><label class="form-label">Email Address</label><input type="email" class="form-control" value="johnseo@gmail.com"></div>
                    <div class="mb-3"><label class="form-label">Phone Number</label><input type="text" class="form-control" value="+63 6666666666"></div>
                    <div class="mb-4"><label class="form-label">Address</label><textarea class="form-control" rows="2">CvSU, Philippines</textarea></div>
                    <button type="submit" class="btn btn-success px-4">Save Profile Changes</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
