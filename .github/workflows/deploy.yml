name: Deploy to Web Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Corrected the checkout action typo here
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Optimized FTP deployment for InfinityFree servers
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          # InfinityFree works much better with 'state-name' set to prevent sync loops
          state-name: .ftp-deploy-sync-state.json
